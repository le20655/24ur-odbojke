<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<title>24 ur odbojke</title>
<style>
:root{
  --bg:#f5f4ee; --surface:#ffffff; --surface2:#eceade; --ink:#23252c; --muted:#6d6f78;
  --line:#dedbce; --accent:#a86f0a; --accent-bg:#f5e3bc; --accent-strong:#8a5c08;
  --courtA:#a86f0a; --courtA-bg:#f8ecd2; --courtB:#35609f; --courtB-bg:#dfe8f5;
  --ok:#2f7d4f; --err:#b0433c; --err-bg:#f6dedc; --warn-bg:#f5e3bc; --night:#5d4fa8;
  --gold:#b8860b; --silver:#7a7f8a; --bronze:#9a6039;
  --shadow:0 1px 3px rgba(35,37,44,.08);
}
@media (prefers-color-scheme: dark){:root{
  --bg:#14161d; --surface:#1d2029; --surface2:#252935; --ink:#e9eaee; --muted:#9a9daa;
  --line:#2e3341; --accent:#e8a020; --accent-bg:#3a2f14; --accent-strong:#f2b747;
  --courtA:#e8a020; --courtA-bg:#33290f; --courtB:#7fa8e0; --courtB-bg:#1c2637;
  --ok:#58b380; --err:#e07b74; --err-bg:#3d1f1d; --warn-bg:#3a2f14; --night:#a294e0;
  --gold:#e8b53a; --silver:#a8aeba; --bronze:#c98a5e;
  --shadow:0 1px 4px rgba(0,0,0,.4);
}}
:root[data-theme="light"]{
  --bg:#f5f4ee; --surface:#ffffff; --surface2:#eceade; --ink:#23252c; --muted:#6d6f78;
  --line:#dedbce; --accent:#a86f0a; --accent-bg:#f5e3bc; --accent-strong:#8a5c08;
  --courtA:#a86f0a; --courtA-bg:#f8ecd2; --courtB:#35609f; --courtB-bg:#dfe8f5;
  --ok:#2f7d4f; --err:#b0433c; --err-bg:#f6dedc; --warn-bg:#f5e3bc; --night:#5d4fa8;
  --gold:#b8860b; --silver:#7a7f8a; --bronze:#9a6039;
  --shadow:0 1px 3px rgba(35,37,44,.08);
}
:root[data-theme="dark"]{
  --bg:#14161d; --surface:#1d2029; --surface2:#252935; --ink:#e9eaee; --muted:#9a9daa;
  --line:#2e3341; --accent:#e8a020; --accent-bg:#3a2f14; --accent-strong:#f2b747;
  --courtA:#e8a020; --courtA-bg:#33290f; --courtB:#7fa8e0; --courtB-bg:#1c2637;
  --ok:#58b380; --err:#e07b74; --err-bg:#3d1f1d; --warn-bg:#3a2f14; --night:#a294e0;
  --gold:#e8b53a; --silver:#a8aeba; --bronze:#c98a5e;
  --shadow:0 1px 4px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,"Segoe UI",Roboto,sans-serif}
button{font:inherit;color:inherit;background:var(--surface2);border:1px solid var(--line);border-radius:6px;padding:4px 10px;cursor:pointer}
button:hover{border-color:var(--muted)}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
button.primary{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700}
button.small{padding:1px 7px;font-size:12.5px}
input,textarea,select{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:4px 8px}
textarea{resize:vertical}
.mono{font-family:ui-monospace,Consolas,"Liberation Mono",monospace;font-variant-numeric:tabular-nums}
.eyebrow{text-transform:uppercase;letter-spacing:.09em;font-size:11.5px;font-weight:700;color:var(--muted)}

header.top{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:2px solid var(--accent);box-shadow:var(--shadow)}
.topline{display:flex;align-items:center;gap:16px;padding:9px 16px;flex-wrap:wrap}
.brand{font-size:21px;font-weight:800;letter-spacing:.02em;white-space:nowrap}
.brand b{color:var(--accent)}
.topstats{display:flex;gap:14px;align-items:baseline;flex-wrap:wrap;color:var(--muted);font-size:13.5px}
.topstats .clock{font-size:17px;font-weight:700;color:var(--ink)}
.spacer{flex:1}
.toolbar{display:flex;gap:7px;flex-wrap:wrap}
nav.tabs{display:flex;gap:2px;padding:0 12px;border-top:1px solid var(--line)}
nav.tabs button{border:none;background:none;border-radius:0;padding:8px 14px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1px}
nav.tabs button.active{color:var(--ink);border-bottom-color:var(--accent)}

main{max-width:1180px;margin:0 auto;padding:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px;box-shadow:var(--shadow)}
h2{font-size:17px;margin:0 0 10px}
.hint{color:var(--muted);font-size:13.5px}

/* nastavitev */
.setupgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.setupgrid textarea{width:100%;min-height:230px}
.optrow{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;align-items:end}
.optrow label{display:flex;flex-direction:column;gap:3px;font-size:13px;color:var(--muted);font-weight:600}
.optrow input{width:auto}
.optrow input[type=number]{width:70px}
.genrow{margin-top:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.counts{font-size:13px;color:var(--muted);margin-top:4px}

/* razpored */
.courts{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media (max-width:860px){.courts{grid-template-columns:1fr}.setupgrid{grid-template-columns:1fr}}
.court{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--surface)}
.courthead{padding:9px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
.court[data-c="0"] .courthead{background:var(--courtA-bg)}
.court[data-c="1"] .courthead{background:var(--courtB-bg)}
.courtname{font-weight:800;letter-spacing:.04em}
.court[data-c="0"] .courtname{color:var(--courtA)}
.court[data-c="1"] .courtname{color:var(--courtB)}
.courthead .end{font-size:12.5px;color:var(--muted);margin-left:auto}
.courtbtns{display:flex;gap:5px;flex-wrap:wrap;padding:7px 12px;border-bottom:1px solid var(--line);background:var(--surface2)}
.qrow{display:flex;gap:10px;align-items:center;padding:7px 12px;border-bottom:1px solid var(--line);position:relative}
.qrow:last-child{border-bottom:none}
.qrow .time{width:52px;flex:none;font-weight:700}
.qrow .time .nd{display:block;font-size:10px;color:var(--night);font-weight:700}
.qrow .body{flex:1;min-width:0}
.qrow .pair{font-weight:600}
.qrow .vs{color:var(--muted);font-weight:400;padding:0 4px}
.qrow .meta{font-size:12px;color:var(--muted)}
.qrow.done{opacity:.62}
.qrow.now{background:var(--accent-bg)}
.qrow.now::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.qrow.now .time{color:var(--accent-strong)}
.qrow.next::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--line)}
.qrow.brk{background:var(--surface2);color:var(--muted)}
.qrow.brk.night{background:color-mix(in srgb,var(--night) 12%,var(--surface));color:var(--night)}
.qrow .score{font-size:16px;font-weight:800;white-space:nowrap}
.qrow .ctl{display:flex;gap:3px;flex-none}
.qrow .ctl button{padding:0 6px;font-size:12px;line-height:22px}
.qrow input.sc{width:46px;text-align:center;padding:2px 4px}
.chip{display:inline-block;font-size:10.5px;font-weight:700;border:1px solid var(--line);border-radius:99px;padding:0 7px;color:var(--muted);vertical-align:1px}
.statusline{display:flex;gap:10px;align-items:center;margin:0 0 12px;flex-wrap:wrap}
.warnbox{border:1px solid var(--line);border-left:4px solid var(--err);border-radius:8px;background:var(--surface);padding:8px 14px;margin-bottom:14px;font-size:13.5px}
.warnbox ul{margin:6px 0 2px;padding-left:18px}
.warnbox .w-night{color:var(--night)}
.warnbox .w-err{color:var(--err);font-weight:700}
.legend{font-size:12.5px;color:var(--muted);margin-top:10px}
/* javna stran: kompaktna glava v eni vrstici */
.mode-viewer{flex-wrap:nowrap}
.mode-viewer .brand{font-size:16px}
.mode-viewer .topstats{flex-wrap:nowrap;font-size:12px;gap:8px;white-space:nowrap;overflow:hidden}
.mode-viewer .toolbar{display:none}

.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;box-shadow:var(--shadow)}
/* javna stran: izbirnik igrišča v lepljivi glavi, vedno viden */
.segbar{display:flex;justify-content:center;padding:7px 10px;border-top:1px solid var(--line)}
.segbar:empty{display:none}
.seg button{border:none;border-radius:0;background:var(--surface);padding:4px 13px}
.seg button+button{border-left:1px solid var(--line)}
.seg button.active{background:var(--accent-bg);color:var(--accent-strong);font-weight:700}
.courts.single{grid-template-columns:1fr}

/* telefon */
@media (max-width:640px){
  main{padding:10px 8px}
  .topline{padding:7px 10px;gap:10px}
  .brand{font-size:18px}
  .topstats{font-size:12.5px;gap:10px}
  nav.tabs{padding:0 4px}
  .card{padding:12px}
  .qrow{flex-wrap:wrap;row-gap:5px;padding:8px 10px}
  .qrow .body{min-width:calc(100% - 66px)}
  .qrow .vs{display:block;padding:0;font-size:12.5px}
  .qrow .scorebox{margin-left:62px}
  .qrow .ctl{margin-left:auto}
  .qrow .ctl button{line-height:26px;padding:0 9px;font-size:13px}
  .qrow input.sc{width:52px;padding:4px}
}

/* lestvica */
.boards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media (max-width:860px){.boards{grid-template-columns:1fr}}
.boards>.card,.courts>.court{min-width:0} /* tabela ne sme razširiti strani čez zaslon */
table.board{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
table.board th{text-align:right;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:4px 7px;border-bottom:2px solid var(--line)}
table.board th.nm,table.board td.nm{text-align:left}
table.board td{padding:5px 7px;border-bottom:1px solid var(--line);text-align:right}
table.board tbody tr:nth-child(1) td.nm{color:var(--gold);font-weight:800}
table.board tbody tr:nth-child(2) td.nm{color:var(--silver);font-weight:800}
table.board tbody tr:nth-child(3) td.nm{color:var(--bronze);font-weight:800}
.tablewrap{overflow-x:auto}

.banner-ro{background:var(--accent-bg);border:1px solid var(--accent);border-radius:8px;padding:8px 14px;margin-bottom:14px;font-size:14px}
dialog{border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
dialog::backdrop{background:rgba(0,0,0,.45)}
.overlay{position:fixed;inset:0;background:color-mix(in srgb,var(--bg) 80%,transparent);display:flex;align-items:center;justify-content:center;z-index:50;font-size:17px;font-weight:700}
@media (prefers-reduced-motion: no-preference){
  .qrow.now{transition:background .3s}
}

/* tisk */
#printArea{display:none}
@media print{
  header.top,main,.overlay{display:none !important}
  #printArea{display:block;font:11.5px/1.45 system-ui,sans-serif;color:#000}
  #printArea h1{font-size:19px;margin:0 0 2px}
  #printArea h2{font-size:14px;margin:14px 0 5px}
  #printArea table{width:100%;border-collapse:collapse}
  #printArea th,#printArea td{border:1px solid #999;padding:3px 6px;text-align:left}
  #printArea .res{width:70px}
  #printArea .rules{margin-top:10px}
}
</style>

<header class="top">
  <div class="topline mode-editor">
    <div class="brand">24 UR <b>ODBOJKE</b></div>
    <div class="topstats" id="topstats"></div>
    <div class="spacer"></div>
    <div class="toolbar" id="toolbar"></div>
  </div>
  <nav class="tabs" id="tabs"></nav>
  <div class="segbar" id="segbar"></div>
</header>
<main id="main"></main>
<div id="printArea"></div>

<script>
/* core.js — logika turnirja "24 ur odbojke" (čisti JS, brez DOM; deluje v node in brskalniku) */
(function (root, factory) {
  if (typeof module !== 'undefined' && module.exports) module.exports = factory();
  else root.Core = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  // ---------- pomožno ----------
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function clockToMin(str) { // "17:00" -> 1020
    const m = /^(\d{1,2}):(\d{2})$/.exec((str || '').trim());
    if (!m) return null;
    return (+m[1] % 24) * 60 + (+m[2] % 60);
  }
  function minToClock(min) { // minute v dnevu -> "HH:MM"
    const t = ((min % 1440) + 1440) % 1440;
    const h = Math.floor(t / 60), mm = t % 60;
    return String(h).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
  }

  // ---------- generator: partnerstva + nasprotniki ----------
  // n punc (0..n-1), n fantov (0..n-1). Krog r: punca i + fant (i+r) mod n.
  // Tekma: {id, round, g1,b1,g2,b2, makeup} — par1 (g1,b1) proti par2 (g2,b2).

  function minCostMatching(items, cost) {
    const m = items.length;
    const used = new Array(m).fill(false);
    let best = null, bestCost = Infinity;
    const cur = [];
    (function dfs(acc) {
      if (acc >= bestCost) return;
      const i = used.indexOf(false);
      if (i === -1) { bestCost = acc; best = cur.slice(); return; }
      used[i] = true;
      for (let j = i + 1; j < m; j++) {
        if (used[j]) continue;
        used[j] = true; cur.push([i, j]);
        dfs(acc + cost(items[i], items[j]));
        cur.pop(); used[j] = false;
      }
      used[i] = false;
    })(0);
    return best.map(([i, j]) => [items[i], items[j]]);
  }

  function generateMatches(n, rng) {
    const oppG = Array.from({ length: n }, () => new Array(n).fill(0)); // punca-punca nasprotnici
    const oppB = Array.from({ length: n }, () => new Array(n).fill(0)); // fant-fant
    const oppX = Array.from({ length: n }, () => new Array(n).fill(0)); // punca-fant (nasproti)
    const matches = [];
    const byePairs = [];
    let id = 0;

    const cost = (p, q) => {
      let c = oppG[p.g][q.g] * oppG[p.g][q.g] * 10
            + oppB[p.b][q.b] * oppB[p.b][q.b] * 10
            + (oppX[p.g][q.b] ** 2 + oppX[q.g][p.b] ** 2) * 3;
      return c + rng() * 0.5;
    };
    const record = (p, q, round, makeup) => {
      oppG[p.g][q.g]++; oppG[q.g][p.g]++;
      oppB[p.b][q.b]++; oppB[q.b][p.b]++;
      oppX[p.g][q.b]++; oppX[q.g][p.b]++;
      matches.push({ id: id++, round, g1: p.g, b1: p.b, g2: q.g, b2: q.b, makeup: !!makeup, res: null });
    };

    for (let r = 0; r < n; r++) {
      let pairs = Array.from({ length: n }, (_, i) => ({ g: i, b: (i + r) % n }));
      if (n % 2 === 1) {
        byePairs.push(pairs[r]); // punca r počiva 1x, fant (2r mod n) 1x
        pairs = pairs.filter((_, i) => i !== r);
      }
      for (const [p, q] of minCostMatching(pairs, cost)) record(p, q, r, false);
    }

    // nadomestne tekme za "bye" pare (lihi n): min-cost razporeditev, en par ostane
    if (n % 2 === 1) {
      let bestPlan = null, bestC = Infinity;
      for (let skip = 0; skip < byePairs.length; skip++) {
        const rest = byePairs.filter((_, i) => i !== skip);
        let tot = 0;
        const plan = minCostMatching(rest, (p, q) => { const c = cost(p, q); return c; });
        for (const [p, q] of plan) tot += cost(p, q);
        if (tot < bestC) { bestC = tot; bestPlan = { plan, leftover: byePairs[skip] }; }
      }
      for (const [p, q] of bestPlan.plan) record(p, q, n, true);
      // preostali bye par dobi nasprotnika iz obstoječih partnerstev (ta dva igralca igrata n+1 tekem)
      const L = bestPlan.leftover;
      let bo = null, boc = Infinity;
      for (let g = 0; g < n; g++) {
        if (g === L.g) continue;
        for (let b = 0; b < n; b++) {
          if (b === L.b) continue;
          const c = cost({ g, b }, L);
          if (c < boc) { boc = c; bo = { g, b }; }
        }
      }
      record(bo, L, n, true);
    }
    return { matches, oppG, oppB };
  }

  // ---------- razporejanje v slote ----------
  // grid[s][c] = indeks tekme ali -1; sloti gosti (prazna celica le v zadnjem slotu).
  // Trde omejitve: igralec 2x v istem slotu; mehke/kaznovane: sosednja slota,
  // nočni počitek < 120 min v kosu, slaba razpršenost.

  function matchPlayers(m, n) { return [m.g1, n + m.b1, m.g2, n + m.b2]; }

  function assignSlots(matches, opts, rng) {
    const n = opts.n;
    const M = matches.length;
    const cells = M + (opts.extraCells || 0);
    const S = Math.ceil(cells / 2);
    const P = 2 * n;

    // začetni razpored: po vrsti (krogi skupaj), prazne celice na koncu
    const grid = [];
    for (let s = 0; s < S; s++) grid.push([2 * s < M ? 2 * s : -1, 2 * s + 1 < M ? 2 * s + 1 : -1]);

    const players = matches.map(m => matchPlayers(m, n)); // matchIdx -> [p1..p4]
    const pslots = Array.from({ length: P }, () => []);
    for (let s = 0; s < S; s++) for (let c = 0; c < 2; c++) {
      const mi = grid[s][c];
      if (mi >= 0) for (const p of players[mi]) pslots[p].push(s);
    }

    // kazni: isti slot 1e6, sosednja slota 4000, razmik 2 slota → 1 (mehko)
    function penPlayer(p) {
      const sl = pslots[p].slice().sort((a, b) => a - b);
      let pen = 0;
      for (let i = 1; i < sl.length; i++) {
        const g = sl[i] - sl[i - 1];
        if (g === 0) pen += 1e6;
        else if (g === 1) pen += 4000;
        else if (g === 2) pen += 1;
      }
      return pen;
    }

    const pens = new Array(P);
    let total = 0;
    for (let p = 0; p < P; p++) { pens[p] = penPlayer(p); total += pens[p]; }

    function replaceSlot(p, from, to) {
      const arr = pslots[p];
      arr[arr.indexOf(from)] = to;
    }

    const iters = opts.iters || 150000;
    let best = { total, grid: grid.map(r => r.slice()) };
    let T = 2500;
    const cool = Math.pow(1 / 2500, 1 / iters);
    let badPlayers = [];

    // poskusi zamenjavo tekem v celicah (s1,c1) <-> (s2,c2); prazna celica je dovoljena na eni strani
    function trySwap(s1, c1, s2, c2) {
      const m1 = grid[s1][c1], m2 = grid[s2][c2];
      if (m1 < 0 && m2 < 0) return false;
      const aff = new Set();
      if (m1 >= 0) for (const p of players[m1]) aff.add(p);
      if (m2 >= 0) for (const p of players[m2]) aff.add(p);
      let delta = 0;
      for (const p of aff) delta -= pens[p];
      if (m1 >= 0) for (const p of players[m1]) replaceSlot(p, s1, s2);
      if (m2 >= 0) for (const p of players[m2]) replaceSlot(p, s2, s1);
      const newPens = {};
      for (const p of aff) { newPens[p] = penPlayer(p); delta += newPens[p]; }
      if (delta <= 0 || rng() < Math.exp(-delta / T)) {
        grid[s1][c1] = m2; grid[s2][c2] = m1;
        for (const p of aff) pens[p] = newPens[p];
        total += delta;
        if (total < best.total) best = { total, grid: grid.map(r => r.slice()) };
        return true;
      }
      if (m1 >= 0) for (const p of players[m1]) replaceSlot(p, s2, s1);
      if (m2 >= 0) for (const p of players[m2]) replaceSlot(p, s1, s2);
      return false;
    }

    // hitra ocena konfliktov tekme mi v okolici slota s (za predizbor kandidatk)
    function conflictScore(mi, s, ignoreSlot) {
      let c = 0;
      for (const p of players[mi]) {
        for (const q of pslots[p]) {
          if (q === ignoreSlot) continue;
          if (q === s) c += 100;
          else if (q === s - 1 || q === s + 1) c++;
        }
      }
      return c;
    }

    let sinceImprove = 0, lastBest = total;
    for (let it = 0; it < iters; it++) {
      T *= cool;
      if (it % 500 === 0) {
        badPlayers = [];
        for (let p = 0; p < P; p++) if (pens[p] >= 4000) badPlayers.push(p);
        if (!badPlayers.length && total < 4000) break; // ni trdih kršitev
        if (best.total < lastBest) { lastBest = best.total; sinceImprove = 0; } else sinceImprove += 500;
        if (sinceImprove > 20000) { T = Math.max(T, 900); sinceImprove = 0; } // ponovno segrevanje
      }
      if (rng() < 0.15) {
        // zamenjava celih slotov (obe igrišči hkrati)
        const s1 = (rng() * S) | 0, s2 = (rng() * S) | 0;
        if (s1 === s2) continue;
        trySwap(s1, 0, s2, 0);
        trySwap(s1, 1, s2, 1);
        continue;
      }
      if (badPlayers.length && rng() < 0.5) {
        // popravljalna poteza: tekmo kršitelja preseli na najmanj konflikten cilj
        const p = badPlayers[(rng() * badPlayers.length) | 0];
        const sl = pslots[p].slice().sort((a, b) => a - b);
        let s1 = -1;
        for (let i = 1; i < sl.length; i++) if (sl[i] - sl[i - 1] <= 1) { s1 = sl[i]; break; }
        if (s1 < 0) s1 = sl[(rng() * sl.length) | 0];
        const c1 = grid[s1][0] >= 0 && players[grid[s1][0]].includes(p) ? 0 : 1;
        const m1 = grid[s1][c1];
        if (m1 < 0) continue;
        let bs = -1, bc = 0, bscore = Infinity;
        for (let k = 0; k < 20; k++) {
          const s2 = (rng() * S) | 0, c2 = (rng() * 2) | 0;
          if (s2 === s1) continue;
          const m2 = grid[s2][c2];
          const sc = conflictScore(m1, s2, s1) + (m2 >= 0 ? conflictScore(m2, s1, s2) : 0);
          if (sc < bscore) { bscore = sc; bs = s2; bc = c2; }
        }
        if (bs >= 0) trySwap(s1, c1, bs, bc);
        continue;
      }
      // naključna zamenjava
      const s1 = (rng() * S) | 0, c1 = (rng() * 2) | 0;
      const s2 = (rng() * S) | 0, c2 = (rng() * 2) | 0;
      if (s1 === s2) continue;
      trySwap(s1, c1, s2, c2);
    }

    // zaključno glajenje: obnovi najboljšo rešitev in izčrpno išči izboljšave za kršitelje
    for (let s = 0; s < S; s++) { grid[s][0] = best.grid[s][0]; grid[s][1] = best.grid[s][1]; }
    for (let p = 0; p < P; p++) pslots[p].length = 0;
    for (let s = 0; s < S; s++) for (let c = 0; c < 2; c++) {
      const mi = grid[s][c];
      if (mi >= 0) for (const p of players[mi]) pslots[p].push(s);
    }
    total = 0;
    for (let p = 0; p < P; p++) { pens[p] = penPlayer(p); total += pens[p]; }
    T = 1e-9; // sprejmi le stroge izboljšave
    let guard = 0, improvedAny = true;
    while (improvedAny && guard++ < 30) {
      improvedAny = false;
      for (let s1 = 0; s1 < S && !improvedAny; s1++) for (let c1 = 0; c1 < 2 && !improvedAny; c1++) {
        const m1 = grid[s1][c1];
        if (m1 < 0) continue;
        if (!players[m1].some(p => pens[p] >= 4000)) continue;
        for (let s2 = 0; s2 < S && !improvedAny; s2++) {
          if (s2 === s1) continue;
          for (let c2 = 0; c2 < 2 && !improvedAny; c2++) {
            const before = total;
            trySwap(s1, c1, s2, c2);
            if (total < before) improvedAny = true;
          }
        }
      }
    }
    if (total < best.total) best = { total, grid: grid.map(r => r.slice()) };
    return best;
  }

  // generate: glavni vstop. cfg: {girls, boys, matchMin, gapMin, startClock, seed}
  // Prazne celice ("prosto igrišče") zrahljajo razpored, da so premori izvedljivi;
  // koliko jih je, omejuje časovni proračun (privzeto 23,5 h minus nočni premor).
  function generate(cfg) {
    const n = cfg.girls.length;
    const slotMin = cfg.matchMin + cfg.gapMin;
    const restarts = cfg.restarts || 4;
    const budgetMin = cfg.budgetMin || 1410;
    const pauseMin = cfg.pauseMin != null ? cfg.pauseMin : 120;
    let bestAll = null;
    let extraCells = 0;
    for (let r = 0; r < restarts; r++) {
      const rng = mulberry32((cfg.seed || 1) + r * 7919);
      const { matches } = generateMatches(n, rng);
      const maxCells = 2 * Math.floor((budgetMin - pauseMin) / slotMin);
      extraCells = Math.max(0, Math.min(Math.max(4, 16 - n), maxCells - matches.length));
      const sol = assignSlots(matches, { n, iters: cfg.iters, extraCells }, rng);
      if (!bestAll || sol.total < bestAll.total) bestAll = { total: sol.total, grid: sol.grid, matches };
      if (bestAll.total < 4000) break; // brez trdih kršitev
    }
    // trmasti primeri: še dva poskusa z 3x več iteracijami
    if (bestAll.total >= 8000) {
      for (let r = restarts; r < restarts + 2; r++) {
        const rng = mulberry32((cfg.seed || 1) + r * 7919);
        const { matches } = generateMatches(n, rng);
        const sol = assignSlots(matches, { n, iters: (cfg.iters || 150000) * 3, extraCells }, rng);
        if (sol.total < bestAll.total) bestAll = { total: sol.total, grid: sol.grid, matches };
        if (bestAll.total < 8000) break;
      }
    }
    // preostale sosednje tekme razreši z vstavljanjem praznega slota med njiju (če čas dopušča)
    const grid = bestAll.grid.map(row => row.slice());
    for (let guard = 0; guard < 12; guard++) {
      const ps = Array.from({ length: 2 * n }, () => []);
      for (let s = 0; s < grid.length; s++) for (let c = 0; c < 2; c++) {
        const mi = grid[s][c];
        if (mi >= 0) for (const p of matchPlayers(bestAll.matches[mi], n)) ps[p].push(s);
      }
      let boundary = -1;
      for (let p = 0; p < 2 * n && boundary < 0; p++) {
        const sl = ps[p].sort((a, b) => a - b);
        for (let i = 1; i < sl.length; i++) if (sl[i] - sl[i - 1] === 1) { boundary = sl[i - 1]; break; }
      }
      if (boundary < 0) break;
      if ((grid.length + 1) * slotMin + pauseMin > budgetMin) break;
      grid.splice(boundary + 1, 0, [-1, -1]);
    }
    // v vrsti (queues): [igrišče0, igrišče1]; prazna celica -> premor "Prosto igrišče"
    const queues = [[], []];
    const breaks = {};
    let bid = 1000;
    // prazne celice na repu odrežemo (ne podaljšujejo razporeda)
    const lastUsed = [0, 1].map(c => {
      for (let s = grid.length - 1; s >= 0; s--) if (grid[s][c] >= 0) return s;
      return -1;
    });
    for (let s = 0; s < grid.length; s++) for (let c = 0; c < 2; c++) {
      const mi = grid[s][c];
      if (mi >= 0) queues[c].push({ t: 'm', id: bestAll.matches[mi].id });
      else if (s < lastUsed[c]) {
        breaks[bid] = { id: bid, dur: slotMin, label: 'Prosto igrišče' };
        queues[c].push({ t: 'b', id: bid++ });
      }
    }
    const matchesById = {};
    for (const m of bestAll.matches) matchesById[m.id] = m;
    return { matches: matchesById, queues, breaks, quality: bestAll.total };
  }

  // vstavi premor v vrsto igrišča `court` pred prvi element, ki se začne ob/po timeMin
  function insertBreakAtTime(state, court, timeMin, dur, label, id) {
    const { matchMin, gapMin } = state.cfg;
    const q = state.queues[court];
    let t = 0, idx = q.length;
    for (let i = 0; i < q.length; i++) {
      if (t >= timeMin) { idx = i; break; }
      t += q[i].t === 'b' ? state.breaks[q[i].id].dur : matchMin + gapMin;
    }
    state.breaks[id] = { id, dur, label: label || '' };
    q.splice(idx, 0, { t: 'b', id });
    return id;
  }

  // ---------- časi, preverjanje, lestvica ----------
  // state: {cfg, matches:{id:m}, queues:[[item]], breaks:{id:{id,dur,label}}}
  function computeTimes(state) {
    const { matchMin, gapMin } = state.cfg;
    const times = {}, breakTimes = {};
    const courtEnd = [0, 0];
    for (let c = 0; c < 2; c++) {
      let t = 0;
      for (const it of state.queues[c]) {
        if (it.t === 'b') {
          const br = state.breaks[it.id];
          breakTimes[it.id] = { start: t, end: t + br.dur, court: c };
          t += br.dur;
        } else {
          times[it.id] = { start: t, end: t + matchMin, court: c };
          t += matchMin + gapMin;
        }
      }
      courtEnd[c] = t;
    }
    return { times, breakTimes, courtEnd };
  }

  function playerName(cfg, p) { // p: 0..n-1 punce, n..2n-1 fantje
    const n = cfg.girls.length;
    return p < n ? cfg.girls[p] : cfg.boys[p - n];
  }

  function validate(state) {
    const cfg = state.cfg;
    const n = cfg.girls.length;
    const { times } = computeTimes(state);
    const startMin = clockToMin(cfg.startClock);
    const warnings = [];
    // intervali po igralcih
    const per = Array.from({ length: 2 * n }, () => []);
    for (const id in state.matches) {
      const m = state.matches[id], tm = times[id];
      if (!tm) continue;
      for (const p of matchPlayers(m, n)) per[p].push(tm);
    }
    let NS = null, NE = null;
    const nsc = clockToMin(cfg.nightStartClock), nec = clockToMin(cfg.nightEndClock);
    if (nsc != null && nec != null) {
      NS = ((nsc - startMin) + 1440) % 1440;
      NE = ((nec - startMin) + 1440) % 1440;
      if (NE <= NS) NE += 1440;
    }
    for (let p = 0; p < 2 * n; p++) {
      const iv = per[p].slice().sort((a, b) => a.start - b.start);
      for (let i = 1; i < iv.length; i++) {
        const rest = iv[i].start - iv[i - 1].end;
        const at = minToClock(startMin + iv[i].start);
        if (rest < 0) warnings.push({ lvl: 'err', msg: playerName(cfg, p) + ' igra dve tekmi hkrati (ob ' + at + ')' });
        else if (rest < 25) warnings.push({ lvl: 'warn', msg: playerName(cfg, p) + ' ima le ' + rest + ' min premora pred tekmo ob ' + at });
      }
      if (NS != null) {
        const busy = iv.filter(t => t.end > NS && t.start < NE);
        if (busy.length) {
          let maxFree = busy[0].start - NS, prevEnd = busy[0].end;
          for (let i = 1; i < busy.length; i++) { maxFree = Math.max(maxFree, busy[i].start - prevEnd); prevEnd = Math.max(prevEnd, busy[i].end); }
          maxFree = Math.max(maxFree, NE - prevEnd);
          if (maxFree < 120) warnings.push({ lvl: 'night', msg: playerName(cfg, p) + ' ponoči nima 2 h počitka v kosu (najdaljši ' + Math.max(0, Math.round(maxFree)) + ' min)' });
        }
      }
    }
    return warnings;
  }

  function standings(state) {
    const cfg = state.cfg;
    const n = cfg.girls.length;
    const rows = Array.from({ length: 2 * n }, (_, p) => ({
      p, name: playerName(cfg, p), played: 0, w: 0, d: 0, l: 0, mp: 0, diff: 0, pf: 0
    }));
    for (const id in state.matches) {
      const m = state.matches[id];
      if (!m.res) continue;
      const { a, b } = m.res;
      const side1 = [m.g1, n + m.b1], side2 = [m.g2, n + m.b2];
      const apply = (ps, f, ag) => {
        for (const p of ps) {
          const r = rows[p];
          r.played++; r.pf += f; r.diff += f - ag;
          if (f > ag) { r.w++; r.mp += 2; } else if (f === ag) { r.d++; r.mp += 1; } else r.l++;
        }
      };
      apply(side1, a, b); apply(side2, b, a);
    }
    const enrich = r => ({
      ...r,
      avgMp: r.played ? r.mp / r.played : 0,
      avgDiff: r.played ? r.diff / r.played : 0,
      avgPf: r.played ? r.pf / r.played : 0
    });
    const cmp = (x, y) => (y.avgMp - x.avgMp) || (y.avgDiff - x.avgDiff) || (y.avgPf - x.avgPf) || x.name.localeCompare(y.name, 'sl');
    return {
      girls: rows.slice(0, n).map(enrich).sort(cmp),
      boys: rows.slice(n).map(enrich).sort(cmp)
    };
  }

  // ---------- kodiranje stanja za deljenje (URL hash) ----------
  function b64urlEncode(bytes) {
    const A = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
    let out = '';
    for (let i = 0; i < bytes.length; i += 3) {
      const b0 = bytes[i], b1 = i + 1 < bytes.length ? bytes[i + 1] : 0, b2 = i + 2 < bytes.length ? bytes[i + 2] : 0;
      out += A[b0 >> 2] + A[((b0 & 3) << 4) | (b1 >> 4)];
      if (i + 1 < bytes.length) out += A[((b1 & 15) << 2) | (b2 >> 6)];
      if (i + 2 < bytes.length) out += A[b2 & 63];
    }
    return out;
  }
  function b64urlDecode(str) {
    const A = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
    const idx = {};
    for (let i = 0; i < A.length; i++) idx[A[i]] = i;
    const out = [];
    for (let i = 0; i < str.length; i += 4) {
      const c = [idx[str[i]], idx[str[i + 1]], i + 2 < str.length ? idx[str[i + 2]] : 0, i + 3 < str.length ? idx[str[i + 3]] : 0];
      out.push((c[0] << 2) | (c[1] >> 4));
      if (i + 2 < str.length) out.push(((c[1] & 15) << 4) | (c[2] >> 2));
      if (i + 3 < str.length) out.push(((c[2] & 3) << 6) | c[3]);
    }
    return new Uint8Array(out);
  }

  function encodeState(state) {
    const ms = Object.values(state.matches).map(m =>
      [m.id, m.round, m.g1, m.b1, m.g2, m.b2, m.makeup ? 1 : 0, m.res ? m.res.a : -1, m.res ? m.res.b : -1]);
    const qs = state.queues.map(q => q.map(it => (it.t === 'b' ? 'b' : 'm') + it.id));
    const bs = Object.values(state.breaks).map(b => [b.id, b.dur, b.label || '']);
    const payload = [1, state.cfg, ms, qs, bs];
    const bytes = new TextEncoder().encode(JSON.stringify(payload));
    return b64urlEncode(bytes);
  }
  function decodeState(token) {
    const json = new TextDecoder().decode(b64urlDecode(token));
    const [v, cfg, ms, qs, bs] = JSON.parse(json);
    if (v !== 1) throw new Error('Neznana različica podatkov');
    const matches = {};
    for (const a of ms) matches[a[0]] = {
      id: a[0], round: a[1], g1: a[2], b1: a[3], g2: a[4], b2: a[5],
      makeup: !!a[6], res: a[7] >= 0 ? { a: a[7], b: a[8] } : null
    };
    const queues = qs.map(q => q.map(s => ({ t: s[0], id: +s.slice(1) })));
    const breaks = {};
    for (const b of bs) breaks[b[0]] = { id: b[0], dur: b[1], label: b[2] };
    return { cfg, matches, queues, breaks };
  }

  return {
    mulberry32, clockToMin, minToClock, matchPlayers, playerName,
    generate, insertBreakAtTime, computeTimes, validate, standings, encodeState, decodeState
  };
});

<script>
'use strict';
/* ===== aplikacija "24 ur odbojke" ===== */
const LSKEY = 'odbojka24.v1';
const SHARE_BASE = 'https://le20655.github.io/24ur-odbojke/'; // javna povezava (GitHub Pages); nastavi build
const MODE = 'editor';             // 'viewer' = javna stran (bere data.js), sicer urejevalnik; nastavi build
const GH_REPO = 'le20655/24ur-odbojke'; // repo za objavo prek GitHub API (gumb "Objavi na splet")
const GH_PATH = 'data.js';           // datoteka, ki jo bere javna stran
const GH_BRANCH = 'main';            // privzeta veja repozitorija
const GHTOKEN_KEY = 'odbojka24.ghtoken'; // GitHub token — shranjen lokalno v ta brskalnik
let S = null;            // stanje turnirja
let readonly = false;    // bralni pogled (prek #d= ali javna stran)
let publishedAt = '';    // ISO čas zadnje objave (javna stran)
let viewerLoading = false;
let tab = 'setup';
let courtView = 'all';   // 'all' | '0' | '1' — katero igrišče kaže razpored
let undoStack = [];
let locked = false;      // zaklenjen turnir: skrije Nastavitev + generiranje/brisanje; ostane vpisovanje in zamikanje
const DEFAULT_GIRLS = ['NEŽA BERCE','NINA TOMAŽIN','ERIKA MOHORIČ','MARUŠA DOLINAR','LIZA POLJANČŠEK','LIA BERCE','LOTI GRUŠKO VANJAK','MAŠA VEGELJ','PUNCA 9','PUNCA 10','PUNCA 11','PUNCA 12'];
const DEFAULT_BOYS = ['JAKA KOPAČ','ROK MROULE','MATIC ENIKO','JAN GOVEKAR','JUŠ BURJEK','DOMEN DOLENC','KRIŠTOF GANTAR','DAVID ŠENK','JAN DOLENC','URBAN JEREB','LUYGGY','JAKA ENIKO'];

/* ---------- pomožno ---------- */
const $ = sel => document.querySelector(sel);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function startClockMin(){ return Core.clockToMin(S.cfg.startClock) ?? 1020; }
function startEpoch(){
  const [y,mo,d] = (S.cfg.startDate || new Date().toISOString().slice(0,10)).split('-').map(Number);
  const sm = startClockMin();
  return new Date(y, mo-1, d, Math.floor(sm/60), sm%60).getTime();
}
function nowMin(){ return (Date.now() - startEpoch())/60000; }
function fmtT(rel){ // relativne minute -> ura (+ oznaka naslednjega dne)
  const abs = startClockMin() + rel;
  return Core.minToClock(abs) + (abs >= 1440 ? '<span class="nd">+1 dan</span>' : '');
}
function save(){ if (readonly) return; try{ localStorage.setItem(LSKEY, JSON.stringify({S, tab, courtView, locked})); }catch(e){} }
function mutate(fn){
  undoStack.push(JSON.stringify(S));
  if (undoStack.length > 25) undoStack.shift();
  fn();
  save(); renderAll();
}
function newId(){ return S.nextId = (S.nextId || 5000) + 1; }
function pairStr(g,b){ return esc(S.cfg.girls[g]) + ' & ' + esc(S.cfg.boys[b]); }
function roundChip(m){ return m.makeup ? 'dod.' : 'krog ' + (m.round+1); }

/* ---------- zagon ---------- */
(function boot(){
  const h = /^#d=([A-Za-z0-9_-]+)(?:&t=(\w+))?$/.exec(location.hash);
  if (h){
    try { S = Core.decodeState(h[1]); readonly = true; tab = h[2] === 'board' ? 'board' : 'sched'; }
    catch(e){ document.body.innerHTML = '<main><div class="card">Povezava je poškodovana ali prekratka.</div></main>'; return; }
  } else if (MODE === 'viewer'){
    readonly = true; tab = 'sched'; viewerLoading = true;
    courtView = '0'; // javna stran kaže eno igrišče naenkrat
    loadPublished();
    setInterval(loadPublished, 60000);
  } else {
    try {
      const raw = localStorage.getItem(LSKEY);
      if (raw){ const o = JSON.parse(raw); S = o.S; tab = o.tab || 'setup'; if (o.courtView === '0' || o.courtView === '1') courtView = o.courtView; locked = !!o.locked; }
    } catch(e){}
  }
  if (!S) S = freshState();
  // starejše shranjeno stanje brez imen: napolni privzeti seznam
  if (!S.queues && S.cfg && (!S.cfg.girls || !S.cfg.girls.length)){
    S.cfg.girls = DEFAULT_GIRLS.slice();
    S.cfg.boys = DEFAULT_BOYS.slice();
  }
  if (!S.queues && !readonly) tab = 'setup';
  renderAll();
  setInterval(()=>{
    renderTop();
    // ne osvežuj, če organizator ravno tipka rezultat
    const ae = document.activeElement;
    if (tab === 'sched' && !(ae && ae.classList && ae.classList.contains('sc'))) renderMain();
  }, 30000);
  window.addEventListener('hashchange', ()=>location.reload());
})();

// javna stran: prenese data.js (razpored kot token + ročno vzdrževani rezultati) in ga uveljavi
function loadPublished(){
  fetch('data.js?_=' + Date.now(), { cache: 'no-store' })
    .then(r => r.text())
    .then(code => {
      const pub = new Function(code + ';return PUB;')();
      const st = Core.decodeState(pub.token);
      for (const id in (pub.rezultati || {})){
        const m = st.matches[id];
        if (m) m.res = pub.rezultati[id] ? { a: +pub.rezultati[id][0], b: +pub.rezultati[id][1] } : null;
      }
      const first = !S || !S.queues;
      S = st; publishedAt = pub.updated || '';
      viewerLoading = false; renderAll();
      if (first) scrollToCurrent();
    })
    .catch(() => { if (viewerLoading){ viewerLoading = false; renderAll(); } });
}

// postavi pogled na zadnjo tekmo z vnesenim rezultatom (dogajanje je tik pod njo)
function scrollToCurrent(){
  const rows = document.querySelectorAll('.qrow.done');
  const last = rows[rows.length - 1];
  if (last && last.scrollIntoView) last.scrollIntoView({ block: 'center' });
}

function freshState(){
  return {
    cfg: {
      girls: DEFAULT_GIRLS.slice(), boys: DEFAULT_BOYS.slice(), startClock: '17:00',
      startDate: new Date().toISOString().slice(0,10),
      matchMin: 20, gapMin: 10,
      nightStartClock: '00:00', nightEndClock: '04:00',
      pauseOn: true, pauseClock: '01:00', pauseMin: 120,
      seed: 1 + Math.floor(Math.random()*1e6)
    },
    matches: null, queues: null, breaks: {}, nextId: 5000
  };
}

/* ---------- glava ---------- */
function segHtml(){
  const opts = MODE === 'viewer'
    ? [['0','Igrišče 1'],['1','Igrišče 2']]
    : [['all','Obe igrišči'],['0','Igrišče 1'],['1','Igrišče 2']];
  return '<span class="seg">' + opts
    .map(([v,l]) => `<button data-act="cview" data-v="${v}" class="${courtView===v?'active':''}">${l}</button>`).join('') + '</span>';
}
function renderTop(){
  const st = $('#topstats');
  const viewer = MODE === 'viewer';
  let html = viewer ? '' : '<span class="clock mono">' + new Date().toLocaleTimeString('sl-SI',{hour:'2-digit',minute:'2-digit'}) + '</span>';
  if (S && S.queues){
    const ms = Object.values(S.matches);
    const done = ms.filter(m=>m.res).length;
    const { courtEnd } = Core.computeTimes(S);
    html += `<span>odigranih <b>${done}/${ms.length}</b></span>`;
    html += `<span>${viewer ? 'konec ob' : 'predviden konec'} <b class="mono">${fmtT(Math.max(...courtEnd))}</b></span>`;
  }

function doGenerate(){
  const girls = $('#girls').value.split('\n').map(x=>x.trim()).filter(Boolean);

  if (girls.length !== boys.length) return alert('Punc in fantov mora biti enako (zdaj ' + girls.length + ' : ' + boys.length + ').');
  if (girls.length < 8 || girls.length > 13) return alert('Podprtih je 8–13 igralcev na spol (16–26 skupaj).');
  const dup = [...girls, ...boys].filter((x,i,a)=>a.indexOf(x)!==i);
  if (dup.length) return alert('Podvojena imena: ' + dup.join(', ') + '. Dodaj priimek ali začetnico.');
  if (S.queues && !confirm('Obstoječi razpored IN VSI REZULTATI se izbrišejo. Nadaljujem?')) return;

  c.girls = girls; c.boys = boys;

  L.push('// Nov token (po spremembi razporeda) naredi gumb "Kopiraj za objavo" v uredi.html.');

function downloadText(name, txt, type){

/* ---------- objava na splet z enim klikom (GitHub API) ---------- */
// Potisne data.js naravnost v repo prek GitHub Contents API. Token (fine-grained,
// Contents: write za GH_REPO) se shrani samo v localStorage tega brskalnika.
function ghToken(){
  let t = (localStorage.getItem(GHTOKEN_KEY) || '').trim();
  if (!t){
    t = (prompt('Prilepi GitHub token za objavo (fine-grained, dovoljenje "Contents: write" za repo ' + GH_REPO + ').\n\nShrani se SAMO v ta brskalnik in nikamor drugam.') || '').trim();
    if (t) localStorage.setItem(GHTOKEN_KEY, t);
  }
  return t;
}
function b64utf8(str){ // UTF-8 -> standardni base64 (kot zahteva GitHub)
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin);
}
async function ghPublish(btn){
  const token = ghToken();
  if (!token) return;
  const api = 'https://api.github.com/repos/' + GH_REPO + '/contents/' + GH_PATH;
  const headers = { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' };
  const label = btn && btn.textContent;
  if (btn){ btn.disabled = true; btn.textContent = 'Objavljam …'; }
  const badToken = () => { localStorage.removeItem(GHTOKEN_KEY); alert('Token ni veljaven ali nima pravice "Contents: write". Ob naslednji objavi vpiši novega.'); };
  try {
    // 1) trenutni sha datoteke (potreben za posodobitev; manjka le, če datoteke še ni)
    let sha = null;
    const g = await fetch(api + '?ref=' + GH_BRANCH, { headers, cache: 'no-store' });
    if (g.status === 401 || g.status === 403) return badToken();
    if (g.ok) sha = (await g.json()).sha;
    // 2) potisni novo vsebino
    const body = { message: 'rezultati — ' + new Date().toLocaleString('sl-SI'), content: b64utf8(publishText()), branch: GH_BRANCH };
    if (sha) body.sha = sha;
    const p = await fetch(api, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (p.status === 401 || p.status === 403) return badToken();
    if (p.ok) alert('Objavljeno! Javna stran bo sveža v ~1 minuti.');
    else { const e = await p.json().catch(() => ({})); alert('Napaka pri objavi: ' + (e.message || p.status)); }
  } catch (err) {
    alert('Napaka pri povezavi z GitHub: ' + err.message);
  } finally {
    if (btn){ btn.disabled = false; btn.textContent = label; }
  }
}

      }
    });
    blocks.push({ r1, r2: lines.length });
    push('');
  }

  // formule lestvice: 4 členi (2 igrišči x 2 strani tekme)
  function sumTerms(nameRef, pair, kind){
    const parts = [];
    for (const b of blocks){
      const H = 'H$' + b.r1 + ':H$' + b.r2, I = 'I$' + b.r1 + ':I$' + b.r2;
      const G = '(' + H + '<>"")*(' + I + '<>"")';
      for (const [nc, own, opp] of [[pair[0], H, I], [pair[1], I, H]]){
        const N = '(' + nc + '$' + b.r1 + ':' + nc + '$' + b.r2 + '=' + nameRef + ')';
        if (kind === 'played') parts.push('SUMPRODUCT(' + N + '*' + G + ')');
        else if (kind === 'points') parts.push('SUMPRODUCT(' + N + '*' + G + '*((' + own + '>' + opp + ')*2+(' + own + '=' + opp + ')))');
        else parts.push('SUMPRODUCT(' + N + '*' + G + '*(' + own + '-' + opp + '))');
      }
    }
    return '=' + parts.join('+');
  }
  const board = (title, names, pair) => {
    push(title);
    push('Ime','Odigrane','Točke','Točke/T','+/− skupaj','+/−/T');
    for (const name of names){
      const r = lines.length + 1;
      push(name,
        sumTerms('$A' + r, pair, 'played'),
        sumTerms('$A' + r, pair, 'points'),
        '=C' + r + '/(B' + r + '+(B' + r + '=0))',
        sumTerms('$A' + r, pair, 'diff'),
        '=E' + r + '/(B' + r + '+(B' + r + '=0))');
    }
    push('');
  };
  board('LESTVICA — PUNCE', c.girls, ['D','F']);
  board('LESTVICA — FANTJE', c.boys, ['E','G']);
  push('Zmaga 2, neodločeno 1, poraz 0. Odloča Točke/T, nato +/−/T. Lestvica se posodablja sama ob vpisu rezultatov.');

  return lines.map(cells => cells.join('\t')).join('\n');
}
function downloadTsv(tsv){
  const blob = new Blob([tsv], { type: 'text/tab-separated-values' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '24ur-odbojke-sheets.tsv';
  a.click(); URL.revokeObjectURL(a.href);
  alert('Prenesena je datoteka 24ur-odbojke-sheets.tsv.\nV Google Sheets: File → Import → Upload → izberi datoteko.');
}
self.__test = { sheetsExport };

/* ---------- akcije ---------- */
function insertCourtDelay(c, min){
  // zamik igrišča: podaljšaj/vstavi premor pred prvo neodigrano tekmo; negativni zamik krajša premore
  const q = S.queues[c];
  let idx = pendingIdx(c); if (idx < 0) idx = q.length;
  if (min > 0){
    const prev = q[idx-1];
    if (prev && prev.t === 'b'){ S.breaks[prev.id].dur += min; }
    else { const id = newId(); S.breaks[id] = { id, dur: min, label: 'Zamik' }; q.splice(idx, 0, { t:'b', id }); }
    return true;
  }
  let need = -min;
  for (let i = idx-1; i >= 0 && need > 0; i--){
    if (q[i].t !== 'b') continue;
    const br = S.breaks[q[i].id];
    const cut = Math.min(br.dur, need);
    br.dur -= cut; need -= cut;
    if (br.dur <= 0){ delete S.breaks[br.id]; q.splice(i,1); }
  }
  if (need > 0) alert('Pred naslednjo tekmo ni dovolj premorov — igrišča ni mogoče pohitriti za celoten čas.');
  return true;
}

document.addEventListener('click', e => {
  const btn = e.target.closest('button'); if (!btn) return;
  const tb = btn.dataset.tab;
  if (tb){ tab = tb; save(); renderAll(); return; }
  const act = btn.dataset.act; if (!act) return;
  const c = +btn.dataset.c, i = +btn.dataset.i;

  if (act === 'togglelock'){
    if (locked){ if (!confirm('Odkleni turnir? Znova bosta na voljo zavihek Nastavitev z generiranjem razporeda in brisanjem — pazi, da ne izbrišeš rezultatov.')) return; locked = false; }
    else { locked = true; if (tab === 'setup') tab = 'sched'; }
    save(); renderAll(); return;
  }
  if (act === 'cview'){ courtView = btn.dataset.v; save(); renderAll(); if (readonly) scrollToCurrent(); return; }
  if (act === 'generate') return doGenerate();
  if (act === 'wipe'){ if (confirm('Res izbrišem VSE (imena, razpored, rezultate)?')){ localStorage.removeItem(LSKEY); S = freshState(); undoStack = []; tab='setup'; renderAll(); } return; }
  if (act === 'undo'){ const prev = undoStack.pop(); if (prev){ S = JSON.parse(prev); save(); renderAll(); } return; }
  if (act === 'print'){ renderPrint(); window.print(); return; }
  if (act === 'export'){
    const blob = new Blob([JSON.stringify({S}, null, 1)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '24ur-odbojke-' + new Date().toISOString().slice(0,16).replace(/[T:]/g,'-') + '.json';
    a.click(); URL.revokeObjectURL(a.href); return;
  }
  if (act === 'import'){
    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
    inp.onchange = () => {
      const f = inp.files[0]; if (!f) return;
      f.text().then(txt => {
        try { const o = JSON.parse(txt); if (!o.S || !o.S.cfg) throw 0; mutate(()=>{ S = o.S; }); }
        catch(_){ alert('Datoteke ni mogoče prebrati — ni izvoz te strani.'); }
      });
    };
    inp.click(); return;
  }
  if (act === 'publish'){
    const txt = publishText();
    const done = () => alert('Vsebina datoteke data.js je skopirana v odložišče.\n\n1) V repozitoriju odpri data.js, označi vse in prilepi.\n2) git add data.js && git commit -m "rezultati" && git push\n\nJavna stran se osveži v ~1 minuti. Posamezne rezultate lahko vmes urejaš tudi ročno kar v datoteki.');
    if (navigator.clipboard && navigator.clipboard.writeText)
      navigator.clipboard.writeText(txt).then(done, () => downloadText('data.js', txt));
    else downloadText('data.js', txt);
    return;
  }
  if (act === 'ghpublish') return ghPublish(btn);
  if (act === 'sheets'){
    const tsv = sheetsExport();
    const done = () => alert('Skopirano v odložišče!\n\n1) Odpri sheets.new\n2) Klikni celico A1 in prilepi (Ctrl+V)\n3) Share → "Anyone with the link: Viewer" → povezavo pošlji igralcem enkrat.\n\nRezultate nato vpisuješ kar v preglednico — s katerekoli naprave, tudi več ljudi hkrati; ure in lestvica se preračunajo same.');
    if (navigator.clipboard && navigator.clipboard.writeText)
      navigator.clipboard.writeText(tsv).then(done, () => downloadTsv(tsv));
    else downloadTsv(tsv);
    return;
  }
  if (act === 'share'){
    const base = SHARE_BASE.startsWith('http') ? SHARE_BASE : location.href.split('#')[0];
    const url = base + '#d=' + Core.encodeState(S);
    (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject()).then(
      () => alert('Povezava je skopirana. Pošlji jo igralcem (skupina, QR …).\nPo vsaki spremembi razporeda deli svežo povezavo.'),
      () => prompt('Kopiraj povezavo:', url));
    return;
  }
  if (act === 'delay') return mutate(()=>insertCourtDelay(c, +btn.dataset.min));
  if (act === 'delayx'){
    const v = parseInt(prompt('Zamik igrišča v minutah (negativno = pohitri):', '15'), 10);
    if (v) mutate(()=>insertCourtDelay(c, v));
    return;
  }
  if (act === 'cbreak' || act === 'gbreak'){
    const v = parseInt(prompt('Trajanje premora v minutah:', '30'), 10);
    if (!v || v < 1) return;
    const lbl = prompt('Oznaka premora:', 'Premor') || 'Premor';
    mutate(()=>{
      const courts = act === 'gbreak' ? [0,1] : [c];
      for (const cc of courts){
        const q = S.queues[cc];
        let idx = pendingIdx(cc); if (idx < 0) idx = q.length;
        const id = newId(); S.breaks[id] = { id, dur: v, label: lbl };
        q.splice(idx, 0, { t:'b', id });
      }
    });
    return;
  }
  if (act === 'align'){
    const { times } = Core.computeTimes(S);
    const idx = pendingIdx(c);
    if (idx < 0) return alert('Na tem igrišču ni več čakajočih tekem.');
    const q = S.queues[c];
    const next = q[idx];
    const diff = Math.round(nowMin() - times[next.id].start);
    if (Math.abs(diff) < 3) return alert('Igrišče je že poravnano (razlika ' + diff + ' min).');
    if (!confirm((diff > 0 ? 'Zamik igrišča za +' : 'Pohitritev igrišča za ') + diff + ' min, da se naslednja tekma začne zdaj?')) return;
    mutate(()=>insertCourtDelay(c, diff));
    return;
  }
  if (act === 'mv'){
    const d = +btn.dataset.d;
    mutate(()=>{
      const q = S.queues[c], j = i + d;
      if (j < 0 || j >= q.length) return;
      [q[i], q[j]] = [q[j], q[i]];
    });
    return;
  }
  if (act === 'xcourt'){
    mutate(()=>{
      const { times, breakTimes } = Core.computeTimes(S);
      const q = S.queues[c], it = q[i];
      const t0 = times[it.id]?.start ?? 0;
      q.splice(i,1);
      const q2 = S.queues[1-c];
      let j = q2.length;
      for (let k = 0; k < q2.length; k++){
        const ts = q2[k].t === 'm' ? times[q2[k].id].start : breakTimes[q2[k].id].start;
        if (ts >= t0){ j = k; break; }
      }
      q2.splice(j, 0, it);
    });
    return;
  }
  if (act === 'bedit'){
    const br = S.breaks[S.queues[c][i].id];
    const v = parseInt(prompt('Novo trajanje premora (min):', br.dur), 10);
    if (v && v > 0) mutate(()=>{ br.dur = v; });
    return;
  }
  if (act === 'bdel'){
    mutate(()=>{ const it = S.queues[c][i]; delete S.breaks[it.id]; S.queues[c].splice(i,1); });
    return;
  }
  if (act === 'rsave'){
    const id = +btn.dataset.id;
    const a = parseInt($('#sa'+id).value, 10), b = parseInt($('#sb'+id).value, 10);
    if (isNaN(a) || isNaN(b) || a < 0 || b < 0) return alert('Vpiši obe številki rezultata.');
    mutate(()=>{ S.matches[id].res = { a, b }; });
    return;
  }
  if (act === 'redit'){
    const id = +btn.dataset.id;
    mutate(()=>{ S.matches[id].res = null; });
    return;
  }
});
document.addEventListener('input', e => { if (e.target.id === 'girls' || e.target.id === 'boys') setupCounts(); });

/* ---------- glavni izris ---------- */
function renderMain(){
  const m = $('#main');
  if (tab === 'setup' && !readonly) { m.innerHTML = renderSetup(); setupCounts(); }
  else if (tab === 'board' && S.queues) m.innerHTML = renderBoard();
  else if (S.queues) m.innerHTML = renderSched();
  else if (readonly) m.innerHTML = viewerLoading
    ? '<div class="card">Nalagam razpored …</div>'
    : '<div class="card"><h2>Razpored še ni objavljen</h2><p class="hint">Organizator ga bo kmalu objavil — poskusi znova čez nekaj minut.</p></div>';
  else { tab = 'setup'; m.innerHTML = renderSetup(); setupCounts(); }
}
function renderAll(){ if (locked && tab === 'setup') tab = 'sched'; renderTop(); renderMain(); }
