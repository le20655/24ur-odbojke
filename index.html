<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>24 ur odbojke</title>
<style>
  :root {
    --ozadje: #f5f6f8; --kartica: #ffffff; --crta: #e2e5ea;
    --besedilo: #1c2330; --sivo: #6b7484; --poudarek: #2563eb;
    --zmaga: #157347; --oznaka: #fff3bf;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ozadje: #14181f; --kartica: #1d232d; --crta: #2c3442;
      --besedilo: #e8ebf0; --sivo: #97a0b0; --poudarek: #60a5fa;
      --zmaga: #4ade80; --oznaka: #4a4420;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--ozadje); color: var(--besedilo);
    max-width: 760px; margin: 0 auto; padding: 12px 12px 60px;
  }
  h1 { font-size: 1.5rem; margin: 8px 0 14px; text-align: center; }
  .vrstica-orodij {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 16px;
  }
  .zavihek {
    padding: 8px 18px; border: 1px solid var(--crta); border-radius: 20px;
    background: var(--kartica); color: var(--besedilo); font-size: 0.95rem;
    cursor: pointer;
  }
  .zavihek.aktiven { background: var(--poudarek); border-color: var(--poudarek); color: #fff; }
  select {
    padding: 8px 12px; border: 1px solid var(--crta); border-radius: 20px;
    background: var(--kartica); color: var(--besedilo); font-size: 0.95rem;
  }
  .krog {
    background: var(--kartica); border: 1px solid var(--crta);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 10px;
  }
  .krog h2 { font-size: 0.85rem; color: var(--sivo); text-transform: uppercase;
             letter-spacing: 0.04em; margin-bottom: 6px; }
  .tekma {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-top: 1px solid var(--crta); font-size: 0.98rem;
  }
  .tekma:first-of-type { border-top: none; }
  .igrisce { color: var(--sivo); font-size: 0.8rem; min-width: 62px; }
  .par { flex: 1; }
  .par.zmagovalec { font-weight: 700; color: var(--zmaga); }
  .proti { color: var(--sivo); font-size: 0.85rem; }
  .rezultat { font-variant-numeric: tabular-nums; font-weight: 600; min-width: 54px; text-align: right; }
  .rezultat.prazen { color: var(--sivo); font-weight: 400; }
  mark { background: var(--oznaka); color: inherit; border-radius: 3px; padding: 0 2px; }
  table { width: 100%; border-collapse: collapse; background: var(--kartica);
          border: 1px solid var(--crta); border-radius: 10px; overflow: hidden; }
  .tabela-ovoj { overflow-x: auto; margin-bottom: 20px; }
  th, td { padding: 8px 10px; text-align: right; font-variant-numeric: tabular-nums; }
  th:first-child, td:first-child { text-align: left; }
  th { background: none; color: var(--sivo); font-size: 0.8rem; text-transform: uppercase;
       letter-spacing: 0.04em; border-bottom: 1px solid var(--crta); }
  tr + tr td { border-top: 1px solid var(--crta); }
  h3 { margin: 18px 0 8px; font-size: 1.1rem; }
  .opomba { color: var(--sivo); font-size: 0.85rem; text-align: center; margin-top: 24px; }
  .opomba a { color: var(--poudarek); }
</style>
</head>
<body>
<h1>🏐 24 ur odbojke</h1>

<div class="vrstica-orodij">
  <button class="zavihek aktiven" id="zav-razpored">Razpored</button>
  <button class="zavihek" id="zav-lestvica">Lestvica</button>
  <select id="filter"><option value="">Vsi igralci</option></select>
</div>

<div id="vsebina"></div>

<p class="opomba">Rezultati se vpisujejo v <code>data.js</code> na GitHubu —
navodila v <a href="https://github.com/le20655/24ur-odbojke/blob/main/NAVODILA.md">NAVODILA.md</a>.</p>

<script src="data.js"></script>
<script>
"use strict";
const PUNCE = "ABCDEFGHIJK".split("");
const FANTJE = Array.from({length: 12}, (_, i) => String(i + 1));

let pogled = "razpored";   // "razpored" | "lestvica"
let izbran = "";           // oznaka filtriranega igralca ("" = vsi)

const ime = o => IMENA[o] || o;

// cas zacetka kroga: ZACETEK + (krog-1) * TRAJANJE_KROGA minut (cez polnoc se prelije)
function casKroga(krog) {
  const [h, m] = ZACETEK.split(":").map(Number);
  const skupaj = (h * 60 + m + (krog - 1) * TRAJANJE_KROGA) % 1440;
  return String(Math.floor(skupaj / 60)).padStart(2, "0") + ":"
       + String(skupaj % 60).padStart(2, "0");
}

// tekma = {krog, igrisce, g1, b1, g2, b2, t1, t2}; t1/t2 = null, ce ni rezultata
function tekme() {
  const sez = [];
  for (const [krog, igrisce, g1, b1, g2, b2] of RAZPORED) {
    const rez = (REZULTATI[krog + igrisce] || "").trim();
    let t1 = null, t2 = null;
    const m = rez.match(/^(\d+)\s*:\s*(\d+)$/);
    if (m) { t1 = +m[1]; t2 = +m[2]; }
    sez.push({krog, igrisce, g1, b1, g2, b2, t1, t2});
  }
  return sez;
}

function parHtml(g, b, zmagal) {
  const oznaci = o => o === izbran ? "<mark>" + ime(o) + "</mark>" : ime(o);
  return '<span class="par' + (zmagal ? " zmagovalec" : "") + '">'
       + oznaci(g) + " &amp; " + oznaci(b) + "</span>";
}

function prikaziRazpored() {
  const poKrogih = new Map();
  for (const t of tekme()) {
    if (izbran && ![t.g1, t.b1, t.g2, t.b2].includes(izbran)) continue;
    if (!poKrogih.has(t.krog)) poKrogih.set(t.krog, []);
    poKrogih.get(t.krog).push(t);
  }
  let html = "";
  for (const [krog, ts] of poKrogih) {
    html += '<div class="krog"><h2>Krog ' + krog + " · " + casKroga(krog) + "</h2>";
    for (const t of ts) {
      const odigrana = t.t1 !== null;
      html += '<div class="tekma">'
        + '<span class="igrisce">Igrišče ' + (t.igrisce === "a" ? 1 : 2) + "</span>"
        + parHtml(t.g1, t.b1, odigrana && t.t1 > t.t2)
        + '<span class="proti">proti</span>'
        + parHtml(t.g2, t.b2, odigrana && t.t2 > t.t1)
        + '<span class="rezultat' + (odigrana ? "" : " prazen") + '">'
        + (odigrana ? t.t1 + ":" + t.t2 : "–") + "</span></div>";
    }
    html += "</div>";
  }
  if (!html) html = '<p class="opomba">Ni tekem.</p>';
  document.getElementById("vsebina").innerHTML = html;
}

function prikaziLestvico() {
  const st = {};  // oznaka -> {tekme, zmage, tocke, razlika}
  for (const o of [...PUNCE, ...FANTJE]) st[o] = {tekme: 0, zmage: 0, tocke: 0, razlika: 0};
  for (const t of tekme()) {
    if (t.t1 === null) continue;
    for (const [o, moje, tuje] of [[t.g1, t.t1, t.t2], [t.b1, t.t1, t.t2],
                                   [t.g2, t.t2, t.t1], [t.b2, t.t2, t.t1]]) {
      st[o].tekme++;
      st[o].tocke += moje;
      st[o].razlika += moje - tuje;
      if (moje > tuje) st[o].zmage++;
    }
  }
  const tabela = (naslov, oznake) => {
    const vrstice = oznake
      .map(o => ({o, ...st[o]}))
      .sort((a, b) => b.tocke - a.tocke || b.razlika - a.razlika || b.zmage - a.zmage);
    let h = "<h3>" + naslov + '</h3><div class="tabela-ovoj"><table>'
      + "<tr><th>Ime</th><th>Tekme</th><th>Zmage</th><th>Točke</th><th>+/−</th></tr>";
    for (const v of vrstice) {
      h += "<tr><td>" + ime(v.o) + "</td><td>" + v.tekme + "</td><td>" + v.zmage
         + "</td><td><b>" + v.tocke + "</b></td><td>"
         + (v.razlika > 0 ? "+" : "") + v.razlika + "</td></tr>";
    }
    return h + "</table></div>";
  };
  document.getElementById("vsebina").innerHTML =
    tabela("Punce", PUNCE) + tabela("Fantje", FANTJE);
}

function prikazi() {
  document.getElementById("zav-razpored").classList.toggle("aktiven", pogled === "razpored");
  document.getElementById("zav-lestvica").classList.toggle("aktiven", pogled === "lestvica");
  if (pogled === "razpored") prikaziRazpored(); else prikaziLestvico();
}

const filter = document.getElementById("filter");
for (const [skupina, oznake] of [["Punce", PUNCE], ["Fantje", FANTJE]]) {
  const og = document.createElement("optgroup");
  og.label = skupina;
  for (const o of oznake) {
    const opt = document.createElement("option");
    opt.value = o;
    opt.textContent = ime(o);
    og.appendChild(opt);
  }
  filter.appendChild(og);
}
filter.onchange = () => { izbran = filter.value; pogled = "razpored"; prikazi(); };
document.getElementById("zav-razpored").onclick = () => { pogled = "razpored"; prikazi(); };
document.getElementById("zav-lestvica").onclick = () => { pogled = "lestvica"; prikazi(); };
prikazi();
</script>
</body>
</html>
