<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>24 ur odbojke</title>
<style>
:root{
  --bg:#f5f4ee; --surface:#ffffff; --surface2:#eceade; --ink:#1e2026; --muted:#5c5f69;
  --line:#dedbce; --accent:#a86f0a; --accent-bg:#f5e3bc; --accent-strong:#8a5c08;
  --courtA:#a86f0a; --courtA-bg:#f8ecd2; --courtB:#35609f; --courtB-bg:#dfe8f5;
  --ok:#2f7d4f; --gold:#b8860b; --silver:#7a7f8a; --bronze:#9a6039;
  --shadow:0 1px 3px rgba(35,37,44,.08);
}
@media (prefers-color-scheme: dark){:root{
  --bg:#14161d; --surface:#1d2029; --surface2:#252935; --ink:#e9eaee; --muted:#9a9daa;
  --line:#2e3341; --accent:#e8a020; --accent-bg:#3a2f14; --accent-strong:#f2b747;
  --courtA:#e8a020; --courtA-bg:#33290f; --courtB:#7fa8e0; --courtB-bg:#1c2637;
  --ok:#58b380; --gold:#e8b53a; --silver:#a8aeba; --bronze:#c98a5e;
  --shadow:0 1px 4px rgba(0,0,0,.4);
}}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,"Segoe UI",Roboto,sans-serif}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
select{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:7px 10px;max-width:52vw}
button:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:1px}

header.top{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:2px solid var(--accent);box-shadow:var(--shadow)}
.topline{display:flex;align-items:center;gap:12px;padding:9px 16px;flex-wrap:nowrap}
.brand{font-size:18px;font-weight:800;letter-spacing:.02em;white-space:nowrap}
.brand b{color:var(--accent)}
.spacer{flex:1}
nav.tabs{display:flex;gap:2px;padding:0 12px;border-top:1px solid var(--line)}
nav.tabs button{padding:8px 14px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1px}
nav.tabs button.active{color:var(--ink);border-bottom-color:var(--accent)}

main{max-width:860px;margin:0 auto;padding:16px}
@media (max-width:640px){main{padding:10px 8px}.topline{padding:7px 10px;gap:10px}}

/* razpored */
.krog{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow);margin-bottom:12px}
.kroghead{padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px}
.kroghead .naslov{font-weight:800;letter-spacing:.04em}
.kroghead .cas{font-weight:700;color:var(--accent-strong);font-variant-numeric:tabular-nums}
.tekma{display:flex;gap:12px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line)}
.tekma:last-child{border-bottom:none}
.chip{flex:none;display:inline-block;font-size:10.5px;font-weight:700;border:1px solid var(--line);border-radius:99px;padding:0 7px;color:var(--muted);white-space:nowrap}
.chip.crt0{color:var(--courtA);border-color:var(--courtA);background:var(--courtA-bg)}
.chip.crt1{color:var(--courtB);border-color:var(--courtB);background:var(--courtB-bg)}
.body{flex:1;min-width:0;font-size:15px;line-height:1.45}
.pair{font-weight:600}
.pair.zmagovalec{color:var(--ok);font-weight:800}
.vs{color:var(--muted);font-weight:400;padding:0 4px}
.score{font-size:16px;font-weight:800;white-space:nowrap;font-variant-numeric:tabular-nums}
.score.prazen{color:var(--muted);font-weight:400}
mark{background:var(--accent-bg);color:var(--accent-strong);border-radius:3px;padding:0 2px}
@media (max-width:640px){
  .tekma{flex-wrap:wrap;row-gap:5px;padding:8px 10px}
  .body{min-width:calc(100% - 80px)}
  .vs{display:block;padding:0;font-size:12.5px}
}

/* lestvica */
.boards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media (max-width:860px){.boards{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);min-width:0;overflow:hidden}
.card h2{font-size:17px;margin:0;padding:12px 14px;border-bottom:1px solid var(--line)}
.tablewrap{overflow-x:auto;padding:0 8px 8px}
table.board{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
table.board th{text-align:right;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:6px 7px;border-bottom:2px solid var(--line)}
table.board th.nm,table.board td.nm{text-align:left}
table.board td{padding:6px 7px;border-bottom:1px solid var(--line);text-align:right}
table.board tr:last-child td{border-bottom:none}
table.board tbody tr:nth-child(1) td.nm{color:var(--gold);font-weight:800}
table.board tbody tr:nth-child(2) td.nm{color:var(--silver);font-weight:800}
table.board tbody tr:nth-child(3) td.nm{color:var(--bronze);font-weight:800}

.opomba{color:var(--muted);font-size:13.5px;text-align:center;margin:24px 0 8px}
.opomba a{color:var(--accent-strong)}
</style>
</head>
<body>

<header class="top">
  <div class="topline">
    <div class="brand">24 UR <b>ODBOJKE</b></div>
    <div class="spacer"></div>
    <select id="filter"><option value="">Vsi igralci</option></select>
  </div>
  <nav class="tabs">
    <button id="zav-razpored" class="active">Razpored</button>
    <button id="zav-lestvica">Lestvica</button>
  </nav>
</header>

<main>
  <div id="vsebina"></div>
  <p class="opomba">Rezultati se vpisujejo v <code>data.js</code> na GitHubu —
  navodila v <a href="https://github.com/le20655/24ur-odbojke/blob/main/NAVODILA.md">NAVODILA.md</a>.</p>
</main>

<script src="data.js"></script>
<script>
"use strict";
const PUNCE = "ABCDEFGHIJK".split("");
const FANTJE = Array.from({length: 12}, (_, i) => String(i + 1));

let pogled = "razpored";   // "razpored" | "lestvica"
let izbran = "";           // oznaka filtriranega igralca ("" = vsi)

const ime = o => IMENA[o] || o;

// cas zacetka kroga: ZACETEK + (krog-1) * TRAJANJE_KROGA minut (cez polnoc se prelije)
function casKroga(krog) {
  const [h, m] = ZACETEK.split(":").map(Number);
  const skupaj = (h * 60 + m + (krog - 1) * TRAJANJE_KROGA) % 1440;
  return String(Math.floor(skupaj / 60)).padStart(2, "0") + ":"
       + String(skupaj % 60).padStart(2, "0");
}

// tekma = {krog, igrisce, g1, b1, g2, b2, t1, t2}; t1/t2 = null, ce ni rezultata
function tekme() {
  const sez = [];
  for (const [krog, igrisce, g1, b1, g2, b2] of RAZPORED) {
    const rez = (REZULTATI[krog + igrisce] || "").trim();
    let t1 = null, t2 = null;
    const m = rez.match(/^(\d+)\s*:\s*(\d+)$/);
    if (m) { t1 = +m[1]; t2 = +m[2]; }
    sez.push({krog, igrisce, g1, b1, g2, b2, t1, t2});
  }
  return sez;
}

function parHtml(g, b, zmagal) {
  const oznaci = o => o === izbran ? "<mark>" + ime(o) + "</mark>" : ime(o);
  return '<span class="pair' + (zmagal ? " zmagovalec" : "") + '">'
       + oznaci(g) + " &amp; " + oznaci(b) + "</span>";
}

function prikaziRazpored() {
  const poKrogih = new Map();
  for (const t of tekme()) {
    if (izbran && ![t.g1, t.b1, t.g2, t.b2].includes(izbran)) continue;
    if (!poKrogih.has(t.krog)) poKrogih.set(t.krog, []);
    poKrogih.get(t.krog).push(t);
  }
  let html = "";
  for (const [krog, ts] of poKrogih) {
    html += '<div class="krog"><div class="kroghead">'
      + '<span class="naslov">Krog ' + krog + "</span>"
      + '<span class="cas">· ' + casKroga(krog) + "</span></div>";
    for (const t of ts) {
      const odigrana = t.t1 !== null;
      const c = t.igrisce === "a" ? 0 : 1;
      html += '<div class="tekma">'
        + '<span class="chip crt' + c + '">Igrišče ' + (c + 1) + "</span>"
        + '<span class="body">'
        + parHtml(t.g1, t.b1, odigrana && t.t1 > t.t2)
        + '<span class="vs">proti</span>'
        + parHtml(t.g2, t.b2, odigrana && t.t2 > t.t1)
        + "</span>"
        + '<span class="score' + (odigrana ? "" : " prazen") + '">'
        + (odigrana ? t.t1 + ":" + t.t2 : "–") + "</span></div>";
    }
    html += "</div>";
  }
  if (!html) html = '<p class="opomba">Ni tekem.</p>';
  document.getElementById("vsebina").innerHTML = html;
}

function prikaziLestvico() {
  const st = {};  // oznaka -> {tekme, zmage, tocke, razlika}
  for (const o of [...PUNCE, ...FANTJE]) st[o] = {tekme: 0, zmage: 0, tocke: 0, razlika: 0};
  for (const t of tekme()) {
    if (t.t1 === null) continue;
    for (const [o, moje, tuje] of [[t.g1, t.t1, t.t2], [t.b1, t.t1, t.t2],
                                   [t.g2, t.t2, t.t1], [t.b2, t.t2, t.t1]]) {
      st[o].tekme++;
      st[o].tocke += moje;
      st[o].razlika += moje - tuje;
      if (moje > tuje) st[o].zmage++;
    }
  }
  const tabela = (naslov, oznake) => {
    const vrstice = oznake
      .map(o => ({o, ...st[o]}))
      .sort((a, b) => b.tocke - a.tocke || b.razlika - a.razlika || b.zmage - a.zmage)
      .slice(0, 5);
    let h = '<div class="card"><h2>' + naslov + '</h2><div class="tablewrap"><table class="board">'
      + '<thead><tr><th class="nm">Ime</th><th>Tekme</th><th>Zmage</th><th>Točke</th><th>+/−</th></tr></thead><tbody>';
    for (const v of vrstice) {
      h += '<tr><td class="nm">' + ime(v.o) + "</td><td>" + v.tekme + "</td><td>" + v.zmage
         + "</td><td><b>" + v.tocke + "</b></td><td>"
         + (v.razlika > 0 ? "+" : "") + v.razlika + "</td></tr>";
    }
    return h + "</tbody></table></div></div>";
  };
  document.getElementById("vsebina").innerHTML =
    '<div class="boards">' + tabela("Punce", PUNCE) + tabela("Fantje", FANTJE) + "</div>";
}

function prikazi() {
  document.getElementById("zav-razpored").classList.toggle("active", pogled === "razpored");
  document.getElementById("zav-lestvica").classList.toggle("active", pogled === "lestvica");
  if (pogled === "razpored") prikaziRazpored(); else prikaziLestvico();
}

const filter = document.getElementById("filter");
for (const [skupina, oznake] of [["Punce", PUNCE], ["Fantje", FANTJE]]) {
  const og = document.createElement("optgroup");
  og.label = skupina;
  for (const o of oznake) {
    const opt = document.createElement("option");
    opt.value = o;
    opt.textContent = ime(o);
    og.appendChild(opt);
  }
  filter.appendChild(og);
}
filter.onchange = () => { izbran = filter.value; pogled = "razpored"; prikazi(); };
document.getElementById("zav-razpored").onclick = () => { pogled = "razpored"; prikazi(); };
document.getElementById("zav-lestvica").onclick = () => { pogled = "lestvica"; prikazi(); };
prikazi();
</script>
</body>
</html>
